---
- name: docker | check if docker binary exists
  ansible.builtin.stat:
    path: /usr/bin/docker
  register: docker_binary

- name: docker | ensure keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  when: not docker_binary.stat.exists

- name: docker | download docker apt signing key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"
  when: not docker_binary.stat.exists

- name: docker | add docker apt repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    filename: docker
    state: present
  when: not docker_binary.stat.exists

- name: docker | install docker packages
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: yes
  when: not docker_binary.stat.exists

- name: docker | deploy daemon.json
  ansible.builtin.template:
    src: docker/daemon.json.j2
    dest: /etc/docker/daemon.json
    owner: root
    group: root
    mode: "0644"
  notify: restart docker

- name: docker | deploy chrome seccomp profile
  ansible.builtin.template:
    src: docker/chrome/seccomp.json
    dest: /etc/docker/seccomp-chrome.json
    owner: root
    group: root
    mode: "0644"

- name: docker | ensure chrome dockerfile directory exists
  ansible.builtin.file:
    path: "{{ home }}/docker/dockerfiles/chrome"
    state: directory
    owner: "{{ user }}"
    group: "{{ group }}"
    mode: "0755"

- name: docker | ensure chrome data directories exist
  ansible.builtin.file:
    path: "{{ home }}/docker/data/chrome/{{ item }}"
    state: directory
    owner: "{{ user }}"
    group: "{{ group }}"
    mode: "0755"
  loop:
    - data
    - downloads

- name: docker | deploy chrome dockerfile
  ansible.builtin.template:
    src: docker/chrome/Dockerfile.j2
    dest: "{{ home }}/docker/dockerfiles/chrome/Dockerfile"
    owner: "{{ user }}"
    group: "{{ group }}"
    mode: "0644"
  register: chrome_dockerfile

- name: docker | deploy chrome local font config
  ansible.builtin.template:
    src: docker/chrome/local.conf
    dest: "{{ home }}/docker/dockerfiles/chrome/local.conf"
    owner: "{{ user }}"
    group: "{{ group }}"
    mode: "0644"
  register: chrome_local_conf

- name: docker | check if chrome image exists
  ansible.builtin.command: docker image inspect {{ docker_repo_prefix }}/chrome:{{ docker_images_version }}
  register: chrome_image
  changed_when: false
  failed_when: false

- name: docker | build chrome image
  ansible.builtin.command: docker build -t {{ docker_repo_prefix }}/chrome:{{ docker_images_version }} {{ home }}/docker/dockerfiles/chrome
  when: chrome_image.rc != 0 or chrome_dockerfile.changed or chrome_local_conf.changed

- name: docker | add user to docker group
  ansible.builtin.user:
    name: "{{ user }}"
    groups: docker
    append: yes

